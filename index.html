<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Apollo University — Premium Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#5b7cfa;
  --accent2:#9b5bff;
  --bg1:#070712;
  --bg2:#0f1020;
  --radius:16px;
  --text:#eef2ff;
}

/* RESET */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* HEADER TITLE */
.portal-top{
  position:fixed;
  left:50%;
  top:20px;
  transform:translateX(-50%);
  text-align:center;
  z-index:20;
}
.portal-top h1{
  font-size:1.7rem;
  font-weight:700;
  color:#ffd966;
  text-shadow:0 6px 30px rgba(0,0,0,0.7);
}
.portal-top small{
  font-size:.9rem;
  opacity:.9;
  color:#fff;
}

/* LOGIN BG */
.login-bg{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  padding:20px;
}
.login-bg::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url('https://img.sanishtech.com/u/3705b93ae7efe020a336345973183f4d.jpg');
  background-size:cover;
  background-position:center;
  opacity:0.6; /* increased opacity for image */
  filter:brightness(0.65) contrast(1);
  z-index:1;
}

.login-bg::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.25); /* lighter black overlay */
  z-index:2;
}


/* GLOW RING */
.neon-ring{
  position:absolute;
  width:680px;
  height:680px;
  left:50%;
  top:45%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle, rgba(91,124,250,0.15), transparent 60%);
  filter:blur(60px);
  z-index:3;
}

/* LOGIN CARD — SMALL SIZE */
.login-card{
  width:100%;
  max-width:420px; /* SMALL SIZE */
  background:rgba(255,255,255,0.05);
  padding:40px;
  border-radius:20px;
  position:relative;
  z-index:4;
  box-shadow:0 18px 50px rgba(0,0,0,0.6);
  backdrop-filter:blur(16px) saturate(160%);
  animation:fadeIn .7s ease;
}

/* floating idle animation */
.floating{
  animation:floating 7s ease-in-out infinite;
}
@keyframes floating{
  0%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
  100%{transform:translateY(0)}
}

/* SHAKE error */
.shake{animation:shake .6s}
@keyframes shake{
  10%,90%{transform:translateX(-1px)}
  20%,80%{transform:translateX(2px)}
  30%,50%,70%{transform:translateX(-4px)}
  40%,60%{transform:translateX(4px)}
}
.error-glow{
  box-shadow:0 0 20px rgba(255,80,90,0.9);
}

/* FORM */
label{
  font-size:.95rem;
  margin-top:12px;
  display:block;
  opacity:0.9;
}
input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  outline:none;
  margin-top:4px;
  background:rgba(255,255,255,0.08);
  color:#fff;
  font-size:1rem;
}

.actions{
  display:flex;
  gap:12px;
  margin-top:18px;
}

.btn-primary{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.15s;
}
.btn-primary:hover{transform:translateY(-3px)}

.btn-ghost{
  flex:1;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  color:#fff;
  cursor:pointer;
}

/* DASHBOARD TOPBAR */
.topbar{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
}
.container{max-width:1200px;margin:20px auto;padding:10px}
.panel{background:rgba(255,255,255,0.05);padding:20px;border-radius:14px}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}
.tile{
  background:rgba(255,255,255,0.08);
  padding:32px;
  border-radius:14px;
  text-align:center;
  cursor:pointer;
  transition:.25s;
}
.tile:hover{
  background:rgba(255,255,255,0.15);
  transform:translateY(-5px);
}
</style>
</head>

<body>

<div class="portal-top">
  <h1>THE APOLLO UNIVERSITY</h1>
</div>

<section class="login-bg" id="page-login">
  <div class="neon-ring"></div>

  <div class="login-card floating" id="loginCard">
    <h2 style="margin-bottom:4px">Sign In</h2>
    <div style="font-size:.9rem;opacity:.9;margin-bottom:16px">
      Student default password: <b>student</b>
    </div>

    <label>ID or Email</label>
    <input id="login-identifier" type="text" autocomplete="username">

    <label>Password</label>
    <input id="login-password" type="password" autocomplete="current-password">

    <div class="actions">
      <button class="btn-primary" id="btn-signin">Sign in</button>
      <button class="btn-ghost" id="btn-ms">Microsoft</button>
    </div>

    <div style="margin-top:12px;display:flex;justify-content:space-between;font-size:.85rem;opacity:.85">
      <span>Forgot password? Contact admin.</span>
      <span id="get-help" style="color:#9b5bff;cursor:pointer">Get help</span>
    </div>
  </div>
</section>

<!-- APP -->
<div id="app-wrapper" style="display:none">
  <header class="topbar">
    <div style="font-weight:700">The Apollo University</div>
    <div style="display:flex;gap:12px">
      <div id="welcomeText"></div>
      <button class="btn-ghost" onclick="doNavigate('#profile')">Profile</button>
      <button class="btn-ghost" onclick="doNavigate('#admin')">Admin</button>
      <button class="btn-ghost" onclick="auth.logout()">Sign Out</button>
    </div>
  </header>

  <main class="container">
    <div id="view"></div>
  </main>
</div>

<script>
/* --------------------------------------------------------
   DATABASE: 20 students + admin + teacher
-------------------------------------------------------- */
function todayDate(){return new Date().toISOString().slice(0,10)}

const buildDB = (() => {
  const students = {};
  const users = [];
  let start = 201;

  for(let i=0;i<20;i++){
    const roll = "S122411510" + (start+i);
    const nm = "Student " + (i+1);

    students[roll] = {
      id: roll,
      name: nm,
      course:"B.Tech - CSE",
      email:`student${i+1}@apollo`,
      marks:[{subject:'DSA',marks:60+i},{subject:'DBMS',marks:55+i}]
    };

    users.push({id:roll,name:nm,email:`student${i+1}@apollo`,password:"student",role:"student"});
  }

  users.push({id:"admin",name:"Administrator",email:"admin@apollo",password:"admin123",role:"admin"});
  users.push({id:"teacher01",name:"Teacher One",email:"teacher1@apollo",password:"teacher123",role:"teacher"});

  return {students,users,teachers:{teacher01:{students:Object.keys(students)}}};
})();

const DEFAULT_DB = {
  users:buildDB.users,
  students:buildDB.students,
  teachers:buildDB.teachers
};

if(!localStorage.getItem("APOLLO_DB"))
  localStorage.setItem("APOLLO_DB",JSON.stringify(DEFAULT_DB));

function readDB(){return JSON.parse(localStorage.getItem("APOLLO_DB"));}

/* --------------------------------------------------------
   LOGIN SYSTEM + EFFECTS
-------------------------------------------------------- */
const auth = {
  login(){
    const id = document.getElementById("login-identifier").value.trim();
    const pw = document.getElementById("login-password").value.trim();
    const db = readDB();

    const card = document.getElementById("loginCard");

    if(!id || !pw) return showError("Enter ID and password");

    const user = db.users.find(u => (u.id===id || u.email===id) && u.password===pw);
    if(!user) return showError("Invalid credentials");

    sessionStorage.setItem("APOLLO_USER",JSON.stringify(user));

    card.classList.remove("floating");
    setTimeout(()=>bootApp(),250);
  },
  logout(){
    sessionStorage.removeItem("APOLLO_USER");
    location.reload();
  }
};

function showError(msg){
  const card = document.getElementById("loginCard");
  card.classList.add("shake","error-glow");
  setTimeout(()=>card.classList.remove("shake","error-glow"),900);
  alert(msg);
}

/* --------------------------------------------------------
   ROUTER
-------------------------------------------------------- */
function doNavigate(h){location.hash=h}

function router(){
  const user = JSON.parse(sessionStorage.getItem("APOLLO_USER")||"null");
  const view = document.getElementById("view");
  const db = readDB();
  const h = location.hash || "#dashboard";

  if(!user) return;

  if(h==="#dashboard"){
    if(user.role==="student"){
      view.innerHTML = `
        <div class="panel">
          <h2>Welcome, ${user.name}</h2>
          <div class="grid">
            <div class="tile" onclick="doNavigate('#profile')">Profile</div>
            <div class="tile" onclick="doNavigate('#exams')">Exams</div>
          </div>
        </div>
      `;
      return;
    }
    if(user.role==="admin"){
      doNavigate('#admin');
      return;
    }
  }

  if(h==="#profile"){
    const s = db.students[user.id];
    view.innerHTML = `
      <div class="panel">
        <h2>${s.name} — Profile</h2>
        <p><b>ID:</b> ${s.id}</p>
        <p><b>Email:</b> ${s.email}</p>
      </div>
    `;
    return;
  }

  if(h==="#exams"){
    const s = db.students[user.id];
    view.innerHTML = `
      <div class="panel">
        <h2>Your Marks</h2>
        ${s.marks.map(m=>`<p>${m.subject}: <b>${m.marks}</b></p>`).join("")}
      </div>
    `;
    return;
  }

  if(h==="#admin"){
    if(user.role!=="admin"){
      view.innerHTML = "<div class='panel'>Unauthorized</div>";
      return;
    }

    const list = Object.values(db.students);
    view.innerHTML = `
      <div class="panel">
        <h2>Admin Dashboard</h2>
        <p>Total students: ${list.length}</p>
      </div>
    `;
    return;
  }
}

/* --------------------------------------------------------
   BOOT
-------------------------------------------------------- */
function bootApp(){
  document.getElementById("page-login").style.display="none";
  document.getElementById("app-wrapper").style.display="block";

  const user = JSON.parse(sessionStorage.getItem("APOLLO_USER"));
  document.getElementById("welcomeText").innerText =
    user.name + " — " + user.role.toUpperCase();

  router();
}

document.getElementById("btn-signin").onclick = ()=>auth.login();
document.getElementById("btn-ms").onclick = ()=>alert("SSO mock");
document.getElementById("get-help").onclick = ()=>alert("Contact admin: +91-12345");

window.onhashchange = router;

/* Initial */
if(sessionStorage.getItem("APOLLO_USER")) bootApp();
</script>

</body>
</html>
